# Additional exoclaw agents — one container per human.
#
# x-claude-env is duplicated from docker-compose.yml because YAML
# anchors don't carry across files.

x-claude-env: &claude-env
  # ── Auth ──────────────────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}

  # ── Model ─────────────────────────────────────────────────────────────────
  CLAUDE_MODEL: ${CLAUDE_MODEL:-}
  CLAUDE_CODE_SUBAGENT_MODEL: ${CLAUDE_CODE_SUBAGENT_MODEL:-}

  # ── Agent teams (experimental) ────────────────────────────────────────────
  CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "true"
  CLAUDE_CODE_TEAM_NAME: ${CLAUDE_CODE_TEAM_NAME:-exoclaw}

  # ── Telemetry / updates ───────────────────────────────────────────────────
  DISABLE_AUTOUPDATER: "true"
  DISABLE_COST_WARNINGS: ${DISABLE_COST_WARNINGS:-false}

  # ── Timeouts & retries ────────────────────────────────────────────────────
  API_TIMEOUT_MS: ${API_TIMEOUT_MS:-600000}
  CLAUDE_CODE_MAX_RETRIES: ${CLAUDE_CODE_MAX_RETRIES:-10}
  BASH_DEFAULT_TIMEOUT_MS: ${BASH_DEFAULT_TIMEOUT_MS:-120000}
  BASH_MAX_TIMEOUT_MS: ${BASH_MAX_TIMEOUT_MS:-600000}
  CLAUDE_ENABLE_STREAM_WATCHDOG: "true"
  CLAUDE_STREAM_IDLE_TIMEOUT_MS: ${CLAUDE_STREAM_IDLE_TIMEOUT_MS:-90000}

  # ── Context & compaction ──────────────────────────────────────────────────
  CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: ${CLAUDE_AUTOCOMPACT_PCT_OVERRIDE:-50}

  # ── Output ────────────────────────────────────────────────────────────────
  BASH_MAX_OUTPUT_LENGTH: ${BASH_MAX_OUTPUT_LENGTH:-}
  CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-}

  # ── Context injection ─────────────────────────────────────────────────────
  CLAUDE_MD_PATH: ${CLAUDE_MD_PATH:-}
  CLAUDE_FILES: ${CLAUDE_FILES:-}

  # ── Debug logging (opt-in) ────────────────────────────────────────────────
  CLAUDE_CODE_DEBUG_LOG_LEVEL: ${CLAUDE_CODE_DEBUG_LOG_LEVEL:-info}

  # ── Remote control ───────────────────────────────────────────────────────
  ENABLE_REMOTE_CONTROL: ${ENABLE_REMOTE_CONTROL:-false}

  # ── SDK mode ─────────────────────────────────────────────────────────────
  CLAUDE_SDK_V2: ${CLAUDE_SDK_V2:-false}

x-agent-defaults: &agent-defaults
  build: .
  restart: unless-stopped
  shm_size: "2gb"
  environment:
    <<: *claude-env
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)throw 1})"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:

  gregclaw:
    <<: *agent-defaults
    container_name: gregclaw
    ports: ["127.0.0.1:8081:8080"]
    volumes:
      - gregclaw-data:/home/agent

  linda:
    <<: *agent-defaults
    container_name: linda
    ports: ["127.0.0.1:8082:8080"]
    volumes:
      - lindaclaw-data:/home/agent

volumes:
  gregclaw-data:
  lindaclaw-data:
